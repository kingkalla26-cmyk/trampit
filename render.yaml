services:
  - type: web
    name: trampit
    env: node
    plan: free
    buildCommand: npm install && cd client && npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: VITE_SENTRY_DSN
        sync: false
