<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>טרמפיט</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FBF7F0" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="טרמפיט" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700;800&family=Heebo:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
      * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
      body { margin: 0; overscroll-behavior: none; }

      /* ── HTML Splash Screen ─────────────────────────────── */
      #html-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #FBF7F0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Heebo', system-ui, sans-serif;
        transition: opacity 0.4s ease;
      }

      #html-splash .logo-box {
        width: 96px;
        height: 96px;
        background: #C2410C;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 28px;
        box-shadow: 0 8px 32px rgba(194, 65, 12, 0.28);
        animation: splash-pulse 2s cubic-bezier(0.4,0,0.6,1) infinite;
      }

      #html-splash .brand {
        font-family: 'Rubik', system-ui, sans-serif;
        font-size: 34px;
        font-weight: 800;
        color: #1C1917;
        letter-spacing: -0.02em;
        margin-bottom: 8px;
        direction: rtl;
      }

      #html-splash .brand span { color: #C2410C; }

      #html-splash .badge {
        font-size: 11px;
        font-weight: 700;
        color: #78716C;
        background: #F5EFE4;
        border: 1px solid #E7E0D1;
        border-radius: 999px;
        padding: 3px 12px;
        margin-bottom: 52px;
        letter-spacing: 0.3px;
      }

      #html-splash .spinner {
        width: 28px;
        height: 28px;
        border: 2.5px solid #E7E0D1;
        border-top-color: #C2410C;
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
        margin-bottom: 12px;
      }

      #html-splash .loading-text {
        font-size: 13px;
        color: #78716C;
        font-weight: 500;
        direction: rtl;
      }

      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }

      @keyframes splash-pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.65; }
      }
    </style>
  </head>
  <body>

    <!-- ── HTML Splash: מופיע לפני React, נמחק אחרי mount ── -->
    <div id="html-splash">
      <div class="logo-box">
        <!-- Navigation icon (Lucide) — inline SVG, אין תלות חיצונית -->
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48"
             viewBox="0 0 24 24" fill="none"
             stroke="white" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
          <polygon points="3 11 22 2 13 21 11 13 3 11"/>
        </svg>
      </div>
      <div class="brand">טרמפ<span>יט</span></div>
      <div class="badge">v0.2 · BETA</div>
      <div class="spinner"></div>
      <div class="loading-text">טוען נתונים...</div>
    </div>
    <!-- ─────────────────────────────────────────────────────── -->

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
